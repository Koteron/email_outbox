services:
  postgres:
    image: postgres:16
    container_name: outbox_postgres_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - outbox_postgres_data:/var/lib/postgresql/data

volumes:
  outbox_postgres_data: